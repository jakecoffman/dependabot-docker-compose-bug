# https://docs.docker.com/compose/compose-file/

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.10.0@sha256:80a3b928a767d4da5d00bd9532318a7db0643d1e06b9982cfbcf1902fa4aa910
    container_name: mealie
    restart: always