# https://docs.docker.com/compose/compose-file/

services:
  minio:
    image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    command:
      - server
      - /data
      - --console-address
      - ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: always

  mealie:
    image: ghcr.io/mealie-recipes/mealie:v3.1.1@sha256:c15f70d7f301145ffa49c988db33071a4585fabf214c2da08bc2cd62737043c8
    container_name: mealie
    restart: always